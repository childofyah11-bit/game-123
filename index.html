<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mad Lib</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #0a0e17 0%, #111827 100%);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: rgba(31, 41, 55, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      width: 100%;
      max-width: 750px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }
    .game-scroll-box {
      max-height: 70vh;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 20px;
      line-height: 2.5;
      font-size: 1.05rem;
      margin-bottom: 20px;
    }
    /* Style for the initial question list form layout */
    .prompt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .prompt-label {
      color: #ef4444;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .madlib-input {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #38bdf8;
      width: 60%;
      font-size: 1rem;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }
    .madlib-input:focus {
      outline: none;
      background: rgba(239, 68, 68, 0.3);
      border-color: #38bdf8;
    }
    button {
      width: 100%;
      background: linear-gradient(90deg, #ef4444, #b91c1c);
      border: none;
      border-radius: 8px;
      padding: 14px;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
    }
    /* Style for final revealed lyrics text formatting */
    .revealed-story {
      white-space: pre-wrap;
      line-height: 2.3;
    }
    .word-reveal {
      color: #38bdf8;
      font-weight: bold;
      text-decoration: underline;
      margin: 0 2px;
    }
  </style>
</head>
<body>

<div class="container">
  <div id="lyrics-board" class="game-scroll-box">Loading game board...</div>
  <button id="action-btn" onclick="revealMadLib()">Unleash the Anthem</button>
</div>

<script>
const taggedLyrics = `The [Adjective:secret] side of me, I never let you [Verb:see]
I keep it [Adjective:caged] but I can't [Verb:control] it
So stay [Direction:away] from me, the [Noun:beast] is ugly
I feel the [Noun:rage] and I just can't [Verb:hold] it

It's [Verb-ing:scratching] on the walls, in the [Noun:closet], in the halls
It comes [Adjective:awake] and I can't control it
[Verb-ing:Hiding] under the [Noun:bed], in my [Body Part:body], in my [Body Part:head]
Why won't [Noun:somebody] come and save me from this, make it [Verb:end]?

I feel it [Adverb:deep] within, it's just beneath the [Noun:skin]
I must [Verb:confess] that I feel like a [Noun:monster]
I [Verb:hate] what I've [Verb:become], the [Noun:nightmare's] just begun
I must confess that I feel like a [Noun:monster]
I, I feel like a [Noun:monster]
I, I feel like a [Noun:monster]

My secret side I keep hid under [Noun:lock] and key
I keep it caged but I can't control it
'Cause if I let him [Direction:out], he'll tear me up, [Verb:break] me down
Why won't somebody come and save me from this, make it end?

I feel it deep within, it's just beneath the skin
I must confess that I feel like a monster
I hate what I've become, the nightmare's just begun
I must confess that I feel like a monster

It's hiding in the [Noun:dark], its [Body Part:teeth] are razor sharp
There's no [Noun:escape] for me, it wants my [Noun:soul], it wants my [Body Part:heart]
No one can [Verb:hear] me scream, maybe it's just a [Noun:dream]
Maybe it's [Preposition:inside] of me, stop this [Noun:monster]!

I feel it deep within, it's just beneath the skin
I must confess that I feel like a monster
I hate what I've become, the nightmare's just begun
I must confess that I feel like a monster
I feel it deep within, it's just beneath the skin
I must confess that I feel like a monster
I, I feel like a [Noun:monster]
I, I feel like a [Noun:monster]`;

let structuralTokens = [];

function initGame() {
  const board = document.getElementById('lyrics-board');
  const regex = /(\[[^\]]+\]|\s+|\S+)/g;
  const matches = taggedLyrics.match(regex) || [];
  let outputHtml = "";
  let promptCounter = 1;

  matches.forEach((token, index) => {
    if (token.startsWith('[') && token.endsWith(']')) {
      const innerContent = token.slice(1, -1);
      const splitIndex = innerContent.indexOf(':');
      const prompt = innerContent.substring(0, splitIndex);
      const originalValue = innerContent.substring(splitIndex + 1);

      structuralTokens.push({ isBlank: true, original: originalValue, id: `blank-${index}` });
      
      // Instead of mixed inline lyrics, build a structural question form list item
      outputHtml += `
        <div class="prompt-row">
          <span class="prompt-label">${promptCounter}. ${prompt}:</span>
          <input type="text" class="madlib-input" id="blank-${index}" placeholder="Type here...">
        </div>`;
      promptCounter++;
    } else {
      // Still log background lyrics elements so they swap accurately later
      structuralTokens.push({ isBlank: false, text: token });
    }
  });

  board.innerHTML = outputHtml;
}

function revealMadLib() {
  let finishedHtml = '<div class="revealed-story">';

  structuralTokens.forEach((token) => {
    if (token.isBlank) {
      const inputElement = document.getElementById(token.id);
      const userValue = inputElement ? inputElement.value.trim() : "";
      const finalWord = userValue || "______";
      finishedHtml += `<span class="word-reveal">${finalWord}</span>`;
    } else {
      finishedHtml += token.text;
    }
  });

  finishedHtml += '</div>';
  
  // Render full lyric text layout replacement directly inside the box
  const board = document.getElementById('lyrics-board');
  board.innerHTML = finishedHtml;
  
  // Transform the button into a restart mechanism
  const actionBtn = document.getElementById('action-btn');
  actionBtn.innerText = "Play Again";
  actionBtn.setAttribute("onclick", "location.reload()");
}

window.onload = initGame;
</script>

</body>
</html>
