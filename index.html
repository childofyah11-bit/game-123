<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Mad Libs: Endless Monster</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #0a0e17 0%, #111827 100%);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: rgba(31, 41, 55, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      width: 100%;
      max-width: 750px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }
    h1 {
      color: #ef4444;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
      text-align: center;
      font-size: 2rem;
      text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
    }
    .subtitle {
      text-align: center;
      color: #9ca3af;
      margin-bottom: 25px;
      font-size: 0.95rem;
    }
    .game-scroll-box {
      max-height: 60vh;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 20px;
      line-height: 2.3;
      white-space: pre-wrap;
      font-size: 1.05rem;
      margin-bottom: 20px;
    }
    .madlib-input {
      background: rgba(239, 68, 68, 0.1);
      border: none;
      border-bottom: 2px solid #ef4444;
      color: #38bdf8;
      width: 100px;
      font-size: 1rem;
      padding: 0 4px;
      text-align: center;
      transition: all 0.2s ease;
    }
    .madlib-input:focus {
      outline: none;
      background: rgba(239, 68, 68, 0.25);
      border-bottom-color: #38bdf8;
    }
    button {
      width: 100%;
      background: linear-gradient(90deg, #ef4444, #b91c1c);
      border: none;
      border-radius: 8px;
      padding: 14px;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
    }
    .word-reveal {
      color: #ef4444;
      font-weight: bold;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Rock Anthem Libs</h1>
  <div class="subtitle">Full Song Edition: Monster by Skillet</div>
  
  <!-- Interactive scroll box containing the song parser -->
  <div id="lyrics-board" class="game-scroll-box">Loading stage...</div>
  
  <button onclick="revealMadLib()">Unleash the Anthem</button>
</div>

<script>
// Complete official lyrics text for Skillet's "Monster"
const fullSongText = `The secret side of me, I never let you see
I keep it caged but I can't control it
So stay away from me, the beast is ugly
I feel the rage and I just can't hold it

It's scratching on the walls, in the closet, in the halls
It comes awake and I can't control it
Hiding under the bed, in my body, in my head
Why won't somebody come and save me from this, make it end?

I feel it deep within, it's just beneath the skin
I must confess that I feel like a monster
I hate what I've become, the nightmare's just begun
I must confess that I feel like a monster
I, I feel like a monster
I, I feel like a monster

My secret side I keep hid under lock and key
I keep it caged but I can't control it
'Cause if I let him out, he'll tear me up, break me down
Why won't somebody come and save me from this, make it end?

I feel it deep within, it's just beneath the skin
I must confess that I feel like a monster
I hate what I've become, the nightmare's just begun
I must confess that I feel like a monster

It's hiding in the dark, its teeth are razor sharp
There's no escape for me, it wants my soul, it wants my heart
No one can hear me scream, maybe it's just a dream
Maybe it's inside of me, stop this monster!

I feel it deep within, it's just beneath the skin
I must confess that I feel like a monster
I hate what I've become, the nightmare's just begun
I must confess that I feel like a monster
I feel it deep within, it's just beneath the skin
I must confess that I feel like a monster
I, I feel like a monster
I, I feel like a monster`;

// Split by whitespace chunks to accurately filter words while retaining structure
const elementsArray = fullSongText.split(/(\s+)/);

function initGame() {
  const board = document.getElementById('lyrics-board');
  let outputHtml = "";
  let realWordCounter = 0;

  elementsArray.forEach((token, index) => {
    // If it's a visible word (not empty whitespace or lines)
    if (token.trim() !== "") {
      realWordCounter++;
      // Every 3rd word gets swapped for a clean input slot
      if (realWordCounter % 3 === 0) {
        outputHtml += `<input type="text" class="madlib-input" id="blank-${index}" placeholder="...">`;
      } else {
        outputHtml += token;
      }
    } else {
      outputHtml += token; // Keep line breaks (\n) and spaces as they are
    }
  });

  board.innerHTML = outputHtml;
}

function revealMadLib() {
  let finishedHtml = "";

  elementsArray.forEach((token, index) => {
    const matchingInput = document.getElementById(`blank-${index}`);
    if (matchingInput) {
      // Plug in what the user typed (or underscores if left blank)
      const userValue = matchingInput.value.trim() || "______";
      finishedHtml += `<span class="word-reveal">${userValue}</span>`;
    } else {
      finishedHtml += token;
    }
  });

  document.getElementById('lyrics-board').innerHTML = finishedHtml;
}

// Fire up the generator when page files execute
window.onload = initGame;
</script>

</body>
</html>
