<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monster Mad Libs</title>
  <style>
    body { background-color: #111827; color: #f3f4f6; font-family: sans-serif; padding: 2rem; display: flex; justify-content: center; }
    .container { max-width: 700px; background: #1f2937; padding: 2rem; border-radius: 12px; }
    h1 { color: #ef4444; }
    #game-board { line-height: 2.2; white-space: pre-wrap; background: #111827; padding: 1.5rem; border-radius: 8px; }
    .madlib-input { background: #374151; border: 1px solid #4b5563; color: #38bdf8; width: 90px; text-align: center; }
    button { background-color: #ef4444; color: white; border: none; padding: 0.75rem 1.5rem; margin-top: 1rem; width: 100%; cursor: pointer; }
    .completed-word { color: #38bdf8; font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <h1>Rock Anthem Libs: Monster</h1>
  <div id="game-board">Loading...</div>
  <button onclick="unleashStory()"></button>
</div>
<script>
const originalLyrics = `The secret side of me... (full lyrics in code)`;
const elementsArray = originalLyrics.split(/(\s+)/);

function setupGame() {
  const board = document.getElementById('game-board');
  let htmlOutput = "";
  let wordCount = 0;
  elementsArray.forEach((part, index) => {
    if (part.trim() !== "") {
      wordCount++;
      htmlOutput += (wordCount % 3 === 0) ? `<input type="text" class="madlib-input" id="word-${index}">` : part;
    } else { htmlOutput += part; }
  });
  board.innerHTML = htmlOutput;
}

function unleashStory() {
  let completedOutput = "";
  elementsArray.forEach((part, index) => {
    const inputElement = document.getElementById(`word-${index}`);
    completedOutput += inputElement ? `<span class="completed-word">${inputElement.value || "_____"}</span>` : part;
  });
  document.getElementById('game-board').innerHTML = completedOutput;
}
window.onload = setupGame;
</script>
</body>
</html>
